<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="name" placeholder="нэрээ бичнэ үү"/>
    <input type="text" id="ovog" placeholder="овгоо бичнэ үү"/>   
    <button id="btn">Нэмэх</button>

    <div id="show" style="background-color:yellow; padding:10px; border:1px solid"></div>
    
<script>
let ner = document.getElementById("name");
let ovog = document.getElementById("ovog");
let btn = document.getElementById("btn");
let show = document.getElementById("show");


let saveArray = JSON.parse(localStorage.getItem("saveArray")) || [];


function storage(){
    if(ner.value === "" || ovog.value === "") return;

    let data = {
        name: ner.value,
        ovog: ovog.value
    }

    saveArray.push(data);
    localStorage.setItem("saveArray", JSON.stringify(saveArray));

    haruulah();   
    ner.value="";
    ovog.value="";
}

function haruulah(){
    show.innerHTML="";   

    saveArray.forEach(item => {
        let div = document.createElement("div");
        div.textContent = item.name + " " + item.ovog;
        show.appendChild(div);
    });
}


btn.addEventListener("click", storage);

haruulah();
</script>
</body>
</html>
